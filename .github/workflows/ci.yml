name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect source changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.frontend.outputs.frontend }}
      worker: ${{ steps.worker.outputs.worker }}
      bot: ${{ steps.bot.outputs.bot }}
      infra: ${{ steps.infra.outputs.infra }}
    steps:
      - name: Checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@v7

      - name: Detect changed paths
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'src/**'
            worker:
              - 'worker/**'
            bot:
              - 'bot/**'
            infra:
              - 'infra/**'

      - name: Decide whether frontend lint should run
        id: frontend
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether worker tests should run
        id: worker
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
          else
            echo "worker=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether bot tests should run
        id: bot
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "bot=${{ steps.filter.outputs.bot }}" >> "$GITHUB_OUTPUT"
          else
            echo "bot=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether infra lint should run
        id: infra
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "infra=${{ steps.filter.outputs.infra }}" >> "$GITHUB_OUTPUT"
          else
            echo "infra=true" >> "$GITHUB_OUTPUT"
          fi

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python (for pre-commit)
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  html-lint:
    name: HTML Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Lint HTML files
        run: npx --yes htmlhint "src/**/*.html"

  check-adr-status:
    name: Check ADR Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check for un-accepted ADRs
        run: |
          echo "🔍 Checking ADR status in meta/adr/ directory..."

          # Check if ADR directory exists
          if [ ! -d "meta/adr" ]; then
            echo "✅ No ADR directory found, check passed"
            exit 0
          fi

          # Function to extract status from ADR file
          get_adr_status() {
            local file="$1"
            awk '/^---$/{flag++; next} flag==1 && /^status:/ {gsub(/^status: *"?/, ""); gsub(/"$/, ""); print; exit}' "$file"
          }

          # Track if any proposed ADRs are found
          found_proposed=false

          # Check all ADR files
          for adr_file in meta/adr/*.md; do
            if [[ -f "$adr_file" && "$(basename "$adr_file")" != "TEMPLATE.md" ]]; then
              filename=$(basename "$adr_file")
              status=$(get_adr_status "$adr_file")

              echo "📄 $filename: status='$status'"

              if [[ "$status" == "Proposed" ]]; then
                echo "❌ ERROR: Found ADR with 'Proposed' status: $filename"
                echo "   ADRs must be accepted before merging to main branch"
                found_proposed=true
              elif [[ "$status" == "Accepted" || "$status" == "Deprecated" || "$status" == "Superseded"* ]]; then
                echo "   ✅ Valid status"
              else
                echo "   ⚠️  Warning: Unknown status '$status' in $filename"
              fi
            fi
          done

          if [[ "$found_proposed" == "true" ]]; then
            echo
            echo "❌ CI FAILURE: Found ADRs with 'Proposed' status"
            echo "   Please use the 'Accept Proposed ADRs' workflow to accept them"
            echo "   or change their status to 'Accepted' before merging"
            exit 1
          else
            echo
            echo "✅ All ADRs have valid status - check passed"
          fi

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            **/*.md

  worker-tests:
    name: Worker Tests
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Run tests
        run: npx --yes vitest@^4.1.0 run
        working-directory: worker

  bot-tests:
    name: Bot Tests
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv --quiet

      - name: Sync dependencies
        run: cd bot && uv sync

      - name: Run tests
        # PYTHONPATH=.. is required because bot/ package imports (e.g., `from bot.main`)
        # expect the repository root in the Python path.
        run: cd bot && PYTHONPATH=.. uv run -- python -m unittest discover -s tests -v

  cfn-lint:
    name: CloudFormation Lint
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint infra/*.yaml
