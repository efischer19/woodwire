AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Standard SQS queue with a dead-letter queue for Woodwire chat events. Deploy
  with: aws cloudformation deploy --stack-name woodwire-chat-queue
  --template-file infra/woodwire-chat-queue.yaml --parameter-overrides
  ChatQueueName=woodwire-chat

# AWS Free Tier context for these queues:
# - 1 million SQS requests per month (permanent free tier)
# - Woodwire's expected ~50K monthly requests stay at ~5% of that limit
# The 20-second long-poll setting minimizes empty receives so the queue remains
# well inside the free tier during normal use.

Parameters:
  ChatQueueName:
    Type: String
    AllowedPattern: '^[A-Za-z0-9_-]{1,76}$'
    Description: Standard SQS queue name. Limited to 76 chars so the derived -dlq name stays within SQS's 80-character limit.
  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic ARN for dead-letter queue alarms. Leave empty to
      create the alarm without a notification target.

Conditions:
  HasAlarmSnsTopic:
    Fn::Not:
      - Fn::Equals:
          - Ref: AlarmSnsTopicArn
          - ''

Resources:
  ChatDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: '${ChatQueueName}-dlq'
      SqsManagedSseEnabled: true
      VisibilityTimeout: 120
      MessageRetentionPeriod: 604800

  ChatQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Ref: ChatQueueName
      SqsManagedSseEnabled: true
      ReceiveMessageWaitTimeSeconds: 20
      VisibilityTimeout: 120
      MessageRetentionPeriod: 604800
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - ChatDeadLetterQueue
            - Arn
        maxReceiveCount: 3

  ChatDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: '${ChatQueueName}-dlq-messages'
      AlarmDescription: >-
        One or more messages have been routed to the Woodwire dead-letter
        queue after exhausting retries.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value:
            Fn::GetAtt:
              - ChatDeadLetterQueue
              - QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        Fn::If:
          - HasAlarmSnsTopic
          - - Ref: AlarmSnsTopicArn
          - Ref: AWS::NoValue

Outputs:
  ChatQueueUrl:
    Description: URL of the primary SQS queue for the local bot consumer configuration.
    Value:
      Ref: ChatQueue
  ChatQueueArn:
    Description: ARN of the primary SQS queue for downstream IAM and Worker configuration.
    Value:
      Fn::GetAtt:
        - ChatQueue
        - Arn
  ChatDeadLetterQueueArn:
    Description: ARN of the dead-letter queue for monitoring and IAM policy references.
    Value:
      Fn::GetAtt:
        - ChatDeadLetterQueue
        - Arn
